<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="lib/simpleRequire.js"></script>
        <script src="lib/config.js"></script>
        <script src="lib/jquery.min.js"></script>
        <script src="lib/facePrint.js"></script>
        <script src="lib/testHelper.js"></script>
        <link rel="stylesheet" href="lib/reset.css" />
    </head>
    <body>
        <style>
        </style>


        <!-- <div id="main_multiple_bar_category_angle_axis"></div> -->
        <div id="main_multiple_bar_value_angle_axis"></div>


        <script>
            require(['echarts'], function (echarts) {
                var option = {
                    angleAxis: {
                        type: 'category',
                        data: ['周一', '周二', '周三', '周四'],
                        z: 10
                    },
                    radiusAxis: {
                    },
                    polar: {
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    series: [{
                        type: 'bar',
                        data: [1, 2, 3, 4],
                        coordinateSystem: 'polar',
                        name: 'A'
                    }, {
                        type: 'bar',
                        data: [2, 4, 6, 8],
                        coordinateSystem: 'polar',
                        name: 'B'
                    }, {
                        type: 'bar',
                        data: [1, 2, 3, 4],
                        coordinateSystem: 'polar',
                        name: 'C'
                    }],
                    legend: {
                        show: true,
                        data: ['A', 'B', 'C']
                    }
                }

                var chart = testHelper.create(echarts, 'main_multiple_bar_category_angle_axis', {
                    title: [
                        'Multiple bars on "category" angle axis',
                    ],
                    option: option,
                    height: 500,
                });

                chart && chart.on('click', function (params) {
                    console.log(params);
                });
            });
        </script>



        <script>
            require(['echarts'], function (echarts) {
                var _ctx = {
                    stack: false,
                };
                
                function createOption() {
                    var data0 = [];
                    var data1 = [];
                    var data2 = [];

                    var time = 0;
                    var maxTime = 12 * 3600 * 1000;
                    var count = 10;
                    for (let i = 0; i < count; i++) {
                        if (i === count - 1) {
                            time = maxTime;
                        }

                        data0.push([Math.random() * 1000 + 800, time]);
                        data1.push([Math.random() * 1000 + 1900, time]);
                        data2.push([Math.random() * 1000 + 2000, time]);

                        if (i % 3 === 0) {
                            time += 1200 * 1000;
                        }
                        else {
                            time += 3000 * 1000;
                        }
                    }

                    var option = {
                        angleAxis: {
                            min: 0,
                            max: maxTime,
                            z: 10,
                            interval: 3600 * 1000,
                            // containShape: false,
                            axisLabel: {
                                formatter(val) {
                                    return Math.round(val / 1000 / 3600);
                                }
                            }
                        },
                        radiusAxis: {
                        },
                        polar: {
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: {
                                type: 'shadow',
                            },
                        },
                        dataZoom: {
                            orient: 'vertical',
                            right: 20,
                            angleAxisIndex: 0,
                        },
                        legend: {
                        },
                        series: [{
                            type: 'bar',
                            data: data0,
                            encode: {
                                tooltip: 0
                            },
                            coordinateSystem: 'polar',
                            name: 'A'
                        }, {
                            type: 'bar',
                            data: data1,
                            encode: {
                                tooltip: 0
                            },
                            coordinateSystem: 'polar',
                            name: 'B'
                        }, {
                            type: 'bar',
                            data: data2,
                            encode: {
                                tooltip: 0
                            },
                            coordinateSystem: 'polar',
                            name: 'C'
                        }],
                    };

                    if (_ctx.stack) {
                        option.series.forEach(individualSeries => {
                            individualSeries.stack = 'a';
                        });
                    }
                    
                    return option;
                }

                function updateChart() {
                    chart.setOption(createOption(), {notMerge: true});
                }

                var chart = testHelper.create(echarts, 'main_multiple_bar_value_angle_axis', {
                    title: [
                        'Multiple bars on "value" angle axis',
                    ],
                    option: createOption(),
                    height: 500,
                    inputsStyle: 'compact',
                    inputs: [{
                        type: 'select',
                        text: 'stack:',
                        values: [false, true],
                        onchange() {
                            _ctx.stack = this.value;
                            updateChart();
                        }
                    }]
                });

                chart && chart.on('click', function (params) {
                    console.log(params);
                });
            });
        </script>


    </body>
</html>
