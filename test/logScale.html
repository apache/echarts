        <script>


            require([
                'echarts',
            ], function (echarts /*, data */) {

                const _ctx = {
                    yAxisMin: undefined,
                    lineConnectNulls: undefined,
                };

                function makeSeriesOption(seriesType, data) {
                    return {
                        type: seriesType,
                        symbolSize: 10,
                        name: [
                            seriesType,
                            seriesType === 'line' ? ` connectNulls: ${_ctx.lineConnectNulls};` : '',
                            ` dataY: ${data.map(function (item) { return item[1]; }).join(', ')}`
                        ].join(''),
                        data: data,
                        connectNulls: _ctx.lineConnectNulls,
                    };
                }

                function makeOption() {
                    return {
                        legend: {
                        },
                        tooltip: {},
                        xAxis: [
                            {
                                id: 0,
                                nameMoveOverlap: true,
                                nameLocation: 'middle',
                                axisLine: {onZero: false},
                                position: ['bottom', 'top']
                            }
                        ],
                        yAxis: [
                            {
                                id: 0,
                                name: 'yAxis is log',
                                type: 'log',
                                min: _ctx.yAxisMin,
                                nameMoveOverlap: true,
                                nameLocation: 'middle',
                                axisLine: {onZero: false},
                                position: ['left', 'right']
                            }
                        ],
                        grid: [
                            {
                                left: 100,
                                right: 10,
                                top: 30,
                                bottom: 120,
                                show: true,
                            }
                        ],
                        series: [
                            makeSeriesOption('scatter', [
                                [-50, 0], [-50, 1219212121]
                            ]),
                            makeSeriesOption('scatter', [
                                [10000000000, -832],
                                [55555550000, 31133232233]
                            ]),
                            makeSeriesOption('line', [
                                [15555550000, 461293242],
                                [20555550000, 581293242],
                                [25000000000, -111832],
                                [30555550000, 719293242],
                                [35555550000, 519293242]
                            ]),
                            makeSeriesOption('line', [
                                [15555550000, 251293242],
                                [20555550000, 231293242],
                                [25000000000, 0],
                                [30555550000, 319293242],
                                [35555550000, 219293242]
                            ]),
                        ]
                    };
                }

                var chart = testHelper.create(echarts, 'main2_negative', {
                    title: [
                        'yAxis: non-positive points should be ignored; others are displayed.',
                        'yAxis extent should exclude the non-positive values.',
                        'When yAxis.min is non-positive, can show a defaults effect, but should be recoverable.',
                        'When yAxis.min is "dataMin", non-positive values should be ignored.',
                        'Check connectNulls.',
                    ],
                    option: makeOption(),
                    inputStyle: 'compact',
                    inputs: [{
                        text: 'yAxis min:',
                        type: 'select',
                        values: [_ctx.yAxisMin, -1000000, 0, 'dataMin', 2000000],
                        onchange: function () {
                            _ctx.yAxisMin = this.value;
                            chart.setOption(makeOption());
                        }
                    }, {
                        text: 'line connectNulls:',
                        type: 'select',
                        values: [_ctx.lineConnectNulls, false, true],
                        onchange: function () {
                            _ctx.lineConnectNulls = this.value;
                            chart.setOption(makeOption());
                        }
                    }]
                });

            });


        </script>

        <script>

            require([
                'echarts'
            ], function (echarts) {

                function genData(exponent) {
                    return [
                        [0.00001782501876267492, `1.6783442046243093e${-9 + exponent}`],
                        [0.20000000000000004, `1.5239855205892977e${-13 + exponent}`],
                        [0.3097633237824966, `9.94535044331967e${-14 + exponent}`],
                        [1, `2.966552224094815e${-19 + exponent}`],
                        // [10, `1.6783442046243093e${-9 + exponent}`],
                        // [100, `1.5239855205892977e${-13 + exponent}`]
                    ];
                }

                option = {
                    style: {
                        height: '100%',
                        width: '100%'
                    },
                    tooltip: {},
                    grid: [
                        {
                        containLabel: true
                        }
                    ],
                    yAxis: [
                        {
                            type: 'log',
                            logBase: 10,
                            axisLabel: {
                                formatter: function (value) {
                                    return value.toExponential(0);
                                }
                            }
                        }
                    ],
                    xAxis: [
                        {
                            // type: 'log',
                            // logBase: 10
                        }
                    ],
                    series: [
                        {
                            data: genData(0),
                            type: 'line',
                            // showSymbol: false
                        }
                    ]
                };

                var chart = testHelper.create(echarts, 'main_small_values', {
                    title: [
                        'test small values',
                    ],
                    option: option,
                    inputs: [
                        {
                            type: 'select',
                            text: 'exponent:',
                            values: [0, -9, -19, -50],
                            onchange: function () {
                                chart.setOption({
                                    series: [{
                                        data: genData(this.value)
                                    }]
                                });
                            }
                        },
                    ]
                });


            });

        </script>

        <script>

            require([
                'echarts',
            ], function (echarts) {

                var data2 = [];
                for (var i = 0; i < 12; i++) {
                    data2.push([Math.random() * (i % 2 === 0 ? 100 : 1000000), Math.random() * 30]);
                }

                option = {
                    tooltip: {
                        trigger: 'axis'
                    },
                    dataZoom: [{
                        type: 'inside',
                        singleAxisIndex: [0]
                    }, {
                        type: 'slider',
                        singleAxisIndex: [0]
                    }],
                    singleAxis: [{
                        type: 'log',
                        id: 'c',
                        bottom: 80,
                        axisPointer: {
                            snap: false,
                            label: {
                                show: true
                            }
                        },
                        splitArea: {
                            show: true
                        },
                    }],
                    series: {
                        type: 'scatter',
                        coordinateSystem: 'singleAxis',
                        singleAxisId: 'c',
                        symbolSize: function (val) {
                            return val[1];
                        },
                        data: data2
                    }
                };

                var chart = testHelper.create(echarts, 'main_singleAxis_dataZoom', {
                    title: [
                        'singleAxis log with dataZoom',
                        'min/max precision should be proper after zooming',
                    ],
                    height: 300,
                    option: option,
                });
            });
        </script>
