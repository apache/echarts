<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" href="data:,">
        <script src="lib/simpleRequire.js"></script>
        <script src="lib/config.js"></script>
        <script>
            (function () {
                var echartsPath = new URLSearchParams(location.search).get('__ECHARTS_PATH__');
                if (echartsPath && typeof require !== 'undefined') {
                    require.config({
                        paths: {
                            echarts: echartsPath
                        }
                    });
                }
            })();
        </script>
        <script src="lib/testHelper.js"></script>
        <link rel="stylesheet" href="lib/reset.css" />
    </head>
    <body>
        <style>
            body {
                font-family: sans-serif;
                padding: 16px;
            }
            h1 {
                font-size: 18px;
                margin: 0 0 12px;
            }
            #status {
                display: inline-block;
                margin-bottom: 14px;
                padding: 6px 10px;
                border-radius: 3px;
                background: #fee;
                color: #a40000;
                font-size: 13px;
                font-weight: bold;
            }
            #status.pass {
                background: #e8f6ed;
                color: #176a32;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(2, 580px);
                gap: 16px;
                align-items: start;
            }
            .panel {
                border: 1px solid #ddd;
                padding: 10px;
            }
            .panel h2 {
                font-size: 14px;
                margin: 0 0 8px;
            }
            .chart {
                width: 560px;
                height: 260px;
            }
            .count {
                margin-top: 6px;
                color: #555;
                font-size: 12px;
            }
        </style>

        <h1>Issue #21512: dataZoom filterMode none/empty should not lock line sampling to full data extent</h1>
        <div id="status">Running</div>
        <div class="grid">
            <div class="panel">
                <h2>filterMode: filter, sampling: lttb</h2>
                <div id="chart-filter" class="chart"></div>
                <div id="count-filter" class="count"></div>
            </div>
            <div class="panel">
                <h2>filterMode: none, sampling: lttb</h2>
                <div id="chart-none" class="chart"></div>
                <div id="count-none" class="count"></div>
            </div>
            <div class="panel">
                <h2>filterMode: empty, sampling: lttb</h2>
                <div id="chart-empty" class="chart"></div>
                <div id="count-empty" class="count"></div>
            </div>
            <div class="panel">
                <h2>filterMode: none, sampling: none</h2>
                <div id="chart-raw" class="chart"></div>
                <div id="count-raw" class="count"></div>
            </div>
        </div>

        <script>
            require(['echarts'], function (echarts) {
                var rawCount = 5000;
                var zoomStart = 2400;
                var zoomEnd = 2499;
                var data = [];

                for (var i = 0; i < rawCount; i++) {
                    var detail = i >= zoomStart && i <= zoomEnd
                        ? (i % 2 ? 0.95 : -0.95)
                        : Math.sin(i / 23) * 0.15;
                    data.push([i, detail + Math.sin(i / 7) * 0.08]);
                }

                function makeOption(filterMode, sampling) {
                    return {
                        animation: false,
                        grid: {
                            top: 16,
                            right: 20,
                            bottom: 54,
                            left: 45
                        },
                        dataZoom: [
                            {
                                id: 'zoom',
                                type: 'slider',
                                filterMode: filterMode,
                                startValue: zoomStart,
                                endValue: zoomEnd,
                                height: 22,
                                bottom: 14
                            }
                        ],
                        xAxis: {
                            type: 'value',
                            min: 'dataMin',
                            max: 'dataMax'
                        },
                        yAxis: {
                            type: 'value',
                            min: -1.2,
                            max: 1.2
                        },
                        series: [
                            {
                                type: 'line',
                                showSymbol: false,
                                sampling: sampling,
                                data: data,
                                lineStyle: {
                                    width: 1
                                }
                            }
                        ]
                    };
                }

                function render(domId, countId, filterMode, sampling) {
                    var chart = echarts.init(document.getElementById(domId), null, {
                        renderer: 'canvas'
                    });
                    chart.setOption(makeOption(filterMode, sampling));
                    var count = chart.getModel().getSeriesByIndex(0).getData().count();
                    document.getElementById(countId).innerHTML = 'processed data count: ' + count;
                    return {
                        chart: chart,
                        count: count
                    };
                }

                var results = {
                    filter: render('chart-filter', 'count-filter', 'filter', 'lttb').count,
                    none: render('chart-none', 'count-none', 'none', 'lttb').count,
                    empty: render('chart-empty', 'count-empty', 'empty', 'lttb').count,
                    raw: render('chart-raw', 'count-raw', 'none', 'none').count
                };

                var visibleCount = zoomEnd - zoomStart + 1;
                var pass = results.filter === visibleCount
                    && results.none === rawCount
                    && results.empty === rawCount
                    && results.raw === rawCount;
                var statusEl = document.getElementById('status');
                statusEl.className = pass ? 'pass' : '';
                statusEl.innerHTML = (pass ? 'PASS' : 'FAIL')
                    + ' - visible window has ' + visibleCount
                    + ' points, so none/empty+lttb should preserve raw detail in this zoom.';

                window.__issue21512Result = {
                    pass: pass,
                    rawCount: rawCount,
                    visibleCount: visibleCount,
                    counts: results
                };
            });
        </script>
    </body>
</html>
