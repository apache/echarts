<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="lib/simpleRequire.js"></script>
        <script src="lib/config.js"></script>
        <script src="lib/jquery.min.js"></script>
        <script src="lib/facePrint.js"></script>
        <script src="lib/testHelper.js"></script>
        <link rel="stylesheet" href="lib/reset.css" />
    </head>
    <body>

        <div id="main_onZero" class="chart"></div>



        <script type="text/javascript">
            require(['echarts'], function (echarts) {

                var _ctx = {
                    // Historically, true by default.
                    yAxisOnZero: 'unspecified',
                    useDataZoom: true,
                    xAxisShowMinMaxLabel: undefined,
                    dataZoomLabelPrecision: undefined,
                };

                function createData() {
                    var MIN_X = -0.0025;
                    var MAX_X = 0.0035;
                    var actualMinX = Infinity;
                    var data0 = [];
                    var data1 = [];
                    var bar_partially_negative = [];

                    var last = 360;
                    var lastDelta = 20;
                    var dataSet = {bar_a: [], bar_b: [], bar_partially_negative: []};
                    var minXSet = {bar_a: Infinity, bar_b: Infinity, bar_partially_negative: Infinity};

                    for (var i = MIN_X; i <= MAX_X; i = +(i + 0.0001).toFixed(10)) {
                        lastDelta += (Math.random() - 0.5) * 5;
                        last += lastDelta;
                        if (i >= 0) {
                            addItem('bar_a', i, last);
                            addItem('bar_b', i, Math.max(90, last - Math.random() * 700));
                        }
                        if (i < 0.0030) {
                            addItem('bar_partially_negative', i, Math.max(70, last + Math.random() * 600));
                        }
                    }
                    function addItem(prop, x, y) {
                        dataSet[prop].push([x, y]);
                        minXSet[prop] = Math.min(minXSet[prop], x);
                    }
                    console.log(dataSet, minXSet)

                    return {dataSet, minXSet};
                }

                var _data = createData();

                function createOption() {
                    var option = {
                        grid: {
                            top: 50,
                            bottom: 100,
                            show: true,
                            backgroundColor: '#fee',
                            borderWidth: 0,
                        },
                        legend: {
                            top: 5,
                            selected: {
                                'bar_partially_negative': false,
                            },
                        },
                        tooltip: {
                            trigger: 'axis',
                            axisPointer: {
                                type: 'shadow'
                            }
                        },
                        dataZoom: _ctx.useDataZoom
                            ? [{
                                type: 'slider',
                                labelPrecision: _ctx.dataZoomLabelPrecision,
                                valuePrecision: 4,
                            }, {
                                type: 'inside',
                                labelPrecision: _ctx.dataZoomLabelPrecision,
                                valuePrecision: 4,
                            }]
                            : undefined,
                        xAxis: {
                            type: 'value',
                            splitLine: {
                                show: false
                            },
                            axisLabel: {
                                showMinLabel: _ctx.xAxisShowMinMaxLabel,
                                showMaxLabel: _ctx.xAxisShowMinMaxLabel,
                            }
                        },
                        yAxis: {
                            type: 'value',
                            axisLine: {
                            },
                            splitLine: {
                                show: false
                            }
                        },
                        series: [{
                            name: 'bar_a',
                            type: 'bar',
                            // barMaxWidth: 10,
                            data: _data.dataSet.bar_a
                        }, {
                            name: 'bar_b',
                            type: 'bar',
                            // barMaxWidth: 10,
                            data: _data.dataSet.bar_b
                        }, {
                            name: 'bar_partially_negative',
                            type: 'bar',
                            // barMaxWidth: 10,
                            data: _data.dataSet.bar_partially_negative
                        }]
                    };

                    if (_ctx.yAxisOnZero !== 'unspecified') {
                        option.yAxis.axisLine.onZero = _ctx.yAxisOnZero;
                    }

                    return option;
                }

                function updateChart() {
                    myChart.setOption(createOption(), {notMerge: true});
                }

                var myChart = testHelper.create(echarts, 'main_onZero', {
                    title: [
                        'Bars must not overflow the xAxis.',
                        'Check yAxis onZero to xAxis (xAxis is value axis).',
                        `series data min value is **${testHelper.printObject(_data.minXSet)}**`,
                    ],
                    option: createOption(),
                    inputsStyle: 'compact',
                    inputs: [{
                        type: 'select',
                        text: 'yAxis.axisLine.onZero:',
                        values: [_ctx.yAxisOnZero, true, false, undefined, 'auto'],
                        onchange: function () {
                            _ctx.yAxisOnZero = this.value;
                            updateChart();
                        }
                    }, {
                        type: 'select',
                        text: 'useDataZoom:',
                        values: [_ctx.useDataZoom, false],
                        onchange: function () {
                            _ctx.useDataZoom = this.value;
                            updateChart();
                        }
                    }, {
                        type: 'select',
                        text: 'xAxisShowMinMaxLabel:',
                        values: [_ctx.xAxisShowMinMaxLabel, true, false],
                        onchange() {
                            _ctx.xAxisShowMinMaxLabel = this.value;
                            updateChart();
                        }
                    }, {
                        type: 'br',
                    }, {
                        type: 'select',
                        text: 'dataZoomLabelPrecision:',
                        values: [_ctx.dataZoomLabelPrecision, 0, 2, 4, 8],
                        onchange() {
                            _ctx.dataZoomLabelPrecision = this.value;
                            updateChart();
                        }
                    }]
                });
            })
        </script>



    </body>
</html>
