<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DataZoom FilterMode Scale Test</title>
    <script src="lib/simpleRequire.js"></script>
    <script src="lib/config.js"></script>
</head>
<body>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #main {
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            height: 100%;
            padding: 12px;
        }

        .chart {
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
        }
    </style>

    <div id="main">
        <div class="chart" id="line-empty"></div>
        <div class="chart" id="line-none"></div>
        <div class="chart" id="bar-empty"></div>
        <div class="chart" id="bar-none"></div>
    </div>

    <script>
        require(['echarts'], function (echarts) {
            var source = [
                ['x', 'y'],
                [1, 10],
                [2, 20],
                [3, 30],
                [4, 40],
                [5, 50]
            ];

            function makeOption(seriesType, filterMode) {
                return {
                    title: {
                        text: seriesType + ', filterMode: ' + filterMode,
                        left: 'center'
                    },
                    dataset: {
                        source: source
                    },
                    xAxis: {
                        type: 'category'
                    },
                    yAxis: {
                        type: 'value'
                    },
                    dataZoom: [{
                        type: 'slider',
                        startValue: 3,
                        endValue: 3,
                        filterMode: filterMode
                    }],
                    series: [{
                        type: seriesType
                    }]
                };
            }

            var charts = [];

            [
                ['line-empty', 'line', 'empty'],
                ['line-none', 'line', 'none'],
                ['bar-empty', 'bar', 'empty'],
                ['bar-none', 'bar', 'none']
            ].forEach(function (item) {
                var chart = echarts.init(document.getElementById(item[0]));
                chart.setOption(makeOption(item[1], item[2]));
                charts.push(chart);
            });

            window.addEventListener('resize', function () {
                charts.forEach(function (chart) {
                    chart.resize();
                });
            });
        });
    </script>
</body>
</html>
