<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="lib/simpleRequire.js"></script>
        <script src="lib/config.js"></script>
    </head>
    <body>
        <style>
            html, body {
                width: 100%;
                padding: 0;
                margin: 0;
            }
            body {
                font-family: sans-serif;
            }
            .case-title {
                height: 32px;
                line-height: 32px;
                padding-left: 16px;
                font-size: 14px;
                color: #555;
                box-sizing: border-box;
            }
            .chart {
                width: 100%;
                height: 400px;
            }
        </style>
        <div class="case-title">orient: center, root children with explicit side</div>
        <div id="main-explicit-side" class="chart"></div>
        <div class="case-title">orient: center, single root expands to both sides automatically</div>
        <div id="main-auto-side" class="chart"></div>
        <script>
            require(['echarts'], function (echarts) {
                var explicitSideChart = echarts.init(document.getElementById('main-explicit-side'));
                var autoSideChart = echarts.init(document.getElementById('main-auto-side'));

                window.onresize = function () {
                    explicitSideChart.resize();
                    autoSideChart.resize();
                };

                explicitSideChart.setOption({
                    series: [{
                        type: 'tree',
                        data: [{
                            name: 'Modeling Methods',
                            children: [{
                                name: 'Regression',
                                side: 'left',
                                children: [
                                    { name: 'Multiple linear regression' },
                                    { name: 'Partial least squares' },
                                    { name: 'Multi-layer feedforward neural network' },
                                    { name: 'General regression neural network' },
                                    { name: 'Support vector regression' }
                                ]
                            }, {
                                name: 'Classification',
                                children: [
                                    { name: 'Logistic regression' },
                                    { name: 'Linear discriminant analysis' },
                                    { name: 'Rules' },
                                    { name: 'Decision trees' },
                                    { name: 'Naive Bayes' },
                                    { name: 'K nearest neighbor' },
                                    { name: 'Probabilistic neural network' },
                                    { name: 'Support vector machine' }
                                ]
                            }, {
                                name: 'Consensus',
                                children: [{
                                    name: 'Models diversity',
                                    children: [
                                        { name: 'Different initializations' },
                                        { name: 'Different parameter choices' },
                                        { name: 'Different architectures' },
                                        { name: 'Different modeling methods' },
                                        { name: 'Different training sets' },
                                        { name: 'Different feature sets' }
                                    ]
                                }, {
                                    name: 'Methods',
                                    children: [
                                        { name: 'Classifier selection' },
                                        { name: 'Classifier fusion' }
                                    ]
                                }, {
                                    name: 'Common',
                                    children: [
                                        { name: 'Bagging' },
                                        { name: 'Boosting' },
                                        { name: 'AdaBoost' }
                                    ]
                                }]
                            }]
                        }],
                        orient: 'center',
                        expandAndCollapse: false,
                        initialTreeDepth: -1,
                        top: 40,
                        bottom: 40,
                        left: 280,
                        right: 280,
                        symbol: 'circle',
                        symbolSize: 10,
                        edgeShape: 'curve',
                        itemStyle: {
                            color: '#1b7ef2'
                        },
                        lineStyle: {
                            color: '#6aa0e6',
                            width: 1.5,
                            curveness: 0.5
                        },
                        label: {
                            fontSize: 14,
                            color: '#222'
                        }
                    }]
                });

                autoSideChart.setOption({
                    series: [{
                        type: 'tree',
                        data: [{
                            name: 'Single Root',
                            children: [{
                                name: 'Discovery',
                                children: [
                                    { name: 'Research notes' },
                                    { name: 'User interviews' },
                                    { name: 'Problem framing' }
                                ]
                            }, {
                                name: 'Design',
                                children: [
                                    { name: 'Information architecture' },
                                    { name: 'Interaction model' },
                                    { name: 'Visual system' }
                                ]
                            }, {
                                name: 'Build',
                                children: [
                                    { name: 'Layout engine' },
                                    { name: 'Rendering' },
                                    { name: 'API surface' }
                                ]
                            }, {
                                name: 'Verify',
                                children: [
                                    { name: 'Unit tests' },
                                    { name: 'HTML case' },
                                    { name: 'Screenshot review' }
                                ]
                            }]
                        }],
                        orient: 'center',
                        expandAndCollapse: false,
                        initialTreeDepth: -1,
                        top: 20,
                        bottom: 20,
                        left: 220,
                        right: 220,
                        symbol: 'circle',
                        symbolSize: 10,
                        edgeShape: 'polyline',
                        itemStyle: {
                            color: '#1b7ef2'
                        },
                        lineStyle: {
                            color: '#6aa0e6',
                            width: 1.5,
                            curveness: 0.5
                        },
                        label: {
                            fontSize: 14,
                            color: '#222'
                        }
                    }]
                });
            });
        </script>
    </body>
</html>
